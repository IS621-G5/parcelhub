services:
  - type: web
    name: parcelhub-api
    runtime: docker
    plan: free                  # ← backend 的 plan: free 保留
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: BCRYPT_COST
        value: 10
      - key: DB_PATH
        value: /data/parcelhub.db
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: parcelhub-web
    runtime: static
    # ← 这里不要再放 plan: free,static site 默认就免费
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html