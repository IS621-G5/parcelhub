server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: any unmatched route serves index.html so client-side routing works,
  # including the ?reset=<token> deep link from password-reset emails.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (vite emits hashed filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
