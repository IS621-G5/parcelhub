# T-SEC-03 (part b) — Dependabot weekly dependency PRs.
# Groups minor + patch updates together to reduce PR noise; majors get
# their own PRs (since they may require code changes).

version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
